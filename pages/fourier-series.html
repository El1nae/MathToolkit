<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>傅里叶级数，动手看</title>
<link rel="stylesheet" href="../ui/theme.css" />
<link rel="stylesheet" href="../ui/components.css" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="../engine/parser.js"></script>
<script src="../engine/math.js"></script>
<script src="../engine/keyboard.js"></script>
<script src="../engine/plot.js"></script>
<script src="../engine/linalg.js"></script>
<script src="../engine/signal.js"></script>
<script src="../engine/ode.js"></script>
<script src="../ui/components.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo } = React;

const WAVES = {
  square: {
    name: "方波", target: (x) => (Math.sin(x) >= 0 ? 1 : -1),
    partial: (x, n) => { let s = 0; for (let k = 1; k <= n; k++) { const m = 2 * k - 1; s += Math.sin(m * x) / m; } return 4 / Math.PI * s; },
  },
  sawtooth: {
    name: "锯齿波", target: (x) => { let t = x / (2 * Math.PI); t = t - Math.floor(t + 0.5); return 2 * t; },
    partial: (x, n) => { let s = 0; for (let k = 1; k <= n; k++) s += Math.pow(-1, k + 1) * Math.sin(k * x) / k; return 2 / Math.PI * s; },
  },
  triangle: {
    name: "三角波", target: (x) => { let t = (x + Math.PI / 2) / (2 * Math.PI); t = t - Math.floor(t); return 1 - 4 * Math.abs(t - 0.5); },
    partial: (x, n) => { let s = 0, sign = 1; for (let k = 1; k <= n; k++) { const m = 2 * k - 1; s += sign * Math.sin(m * x) / (m * m); sign = -sign; } return 8 / (Math.PI * Math.PI) * s; },
  },
};

function App() {
  const [waveType, setWaveType] = useState("square");
  const [n, setN] = useState(3);
  const w = WAVES[waveType];
  const keys = Object.keys(WAVES);

  const ctx = useMemo(() => createPlotContext({
    W: 360, H: 240, xMin: -Math.PI, xMax: 3 * Math.PI, yMin: -1.5, yMax: 1.5,
  }), []);

  const targetPath = useMemo(() => buildCurvePath(w.target, ctx, { n: 600 }), [waveType, ctx]);
  const sumPath = useMemo(() => buildCurvePath((x) => w.partial(x, n), ctx, { n: 600 }), [waveType, n, ctx]);

  return (
    <div>
      <PageHeader title="傅里叶级数，动手看" subtitle="Fourier series — building waves from sine harmonics" />
      <Intuition>
        任何周期信号都能写成一堆<b style={{ color: C.fn }}>正弦波</b>的叠加。
        谐波项数 n 越多，<b style={{ color: C.fn }}>部分和</b> 越贴近
        <b style={{ color: C.dim }}>目标波形</b>——转角处的抖动叫吉布斯现象。
      </Intuition>

      <Card>
        <ExampleSwitcher examples={keys.map((k) => ({ name: WAVES[k].name }))}
          active={keys.indexOf(waveType)} onChange={(i) => { setWaveType(keys[i]); }} />
      </Card>

      <Card variant="chart">
        <div className="chart-label">目标波形 vs 前 {n} 个谐波之和</div>
        <svg viewBox="0 0 360 240">
          <defs dangerouslySetInnerHTML={{ __html: GLOW_FILTER_SVG }} />
          <GridLines ctx={ctx} />
          <Axes ctx={ctx} />
          <path d={targetPath} fill="none" stroke={C.dim} strokeWidth="1.6" strokeDasharray="5 4" />
          <path d={sumPath} fill="none" stroke={C.fn} strokeWidth="2.4" filter="url(#glow)" strokeLinecap="round" />
        </svg>
        <Legend items={[
          { color: C.dim, label: "目标波形 target", dashed: true },
          { color: C.fn, label: `部分和 (n=${n})` },
        ]} />
      </Card>

      <Card>
        <SliderControl label="谐波项数 n" display={n} min={1} max={20} step={1} value={n}
          color={C.fn} onChange={(v) => setN(Math.round(v))} last
          hint="拖动 n，看正弦波越叠越像目标波形" />
      </Card>

      <Card style={{ marginBottom: 0 }}>
        <Steps title="三步看傅里叶级数" items={[
          { title: "选波形", en: "Pick a wave", desc: "方波、锯齿波、三角波都是周期信号", color: C.acc },
          { title: "加谐波", en: "Add harmonics", desc: "每个谐波是特定频率、幅度的正弦波", color: C.fn },
          { title: "看逼近", en: "Converge", desc: "n 越大越贴合，转角处仍有吉布斯抖动", color: C.fill },
        ]} />
      </Card>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
