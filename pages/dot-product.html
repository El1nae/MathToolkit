<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>点积</title>
<link rel="stylesheet" href="../ui/theme.css" />
<link rel="stylesheet" href="../ui/components.css" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="../engine/parser.js"></script>
<script src="../engine/math.js"></script>
<script src="../engine/keyboard.js"></script>
<script src="../engine/plot.js"></script>
<script src="../engine/linalg.js"></script>
<script src="../engine/signal.js"></script>
<script src="../engine/ode.js"></script>
<script src="../ui/components.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

function App() {
  const [ax, setAx] = useState(4), [ay, setAy] = useState(1);
  const [bx, setBx] = useState(2), [by, setBy] = useState(4);
  const ctx = createCenteredContext({ W: 360, H: 340, unit: 26 });
  const dot = ax * bx + ay * by;
  const la = Math.hypot(ax, ay), lb = Math.hypot(bx, by);
  const cos = (la * lb > 1e-9) ? dot / (la * lb) : 0;
  const angDeg = Math.acos(Math.max(-1, Math.min(1, cos))) * 180 / Math.PI;
  const aA = Math.atan2(ay, ax), aB = Math.atan2(by, bx);
  const R = 34, arc = `M ${ctx.sx(0) + R * Math.cos(aA)} ${ctx.sy(0) - R * Math.sin(aA)} A ${R} ${R} 0 0 ${aB > aA ? 0 : 1} ${ctx.sx(0) + R * Math.cos(aB)} ${ctx.sy(0) - R * Math.sin(aB)}`;
  const k = (lb * lb > 1e-9) ? dot / (lb * lb) : 0;
  const grid = []; for (let g = -6; g <= 6; g++) grid.push(g);

  return (
    <div>
      <PageHeader title="点积" subtitle="Dot product — length times aligned length" backHref="../index.html" />
      <Intuition>点积 <b>a·b = |a||b|cos θ</b> 度量两向量方向的一致程度。夹角越小，值越大；<b style={{ color: C.acc }}>正交时点积为 0</b>；夹角为钝角时取负值。绿色虚线为 a 在 b 上的投影长度。</Intuition>
      <Card variant="chart">
        <svg viewBox="0 0 360 340">
          <defs dangerouslySetInnerHTML={{ __html: GLOW_FILTER_SVG }} />
          {grid.map(g => <g key={g}>
            <line x1={ctx.sx(g)} y1={ctx.sy(-6)} x2={ctx.sx(g)} y2={ctx.sy(6)} stroke={C.grid} strokeWidth="0.5" />
            <line x1={ctx.sx(-6)} y1={ctx.sy(g)} x2={ctx.sx(6)} y2={ctx.sy(g)} stroke={C.grid} strokeWidth="0.5" />
          </g>)}
          <line x1={ctx.sx(-6)} y1={ctx.sy(0)} x2={ctx.sx(6)} y2={ctx.sy(0)} stroke={C.axis} strokeWidth="1" />
          <line x1={ctx.sx(0)} y1={ctx.sy(-6)} x2={ctx.sx(0)} y2={ctx.sy(6)} stroke={C.axis} strokeWidth="1" />
          <path d={arc} fill="none" stroke={C.acc} strokeWidth="1.5" />
          <line x1={ctx.sx(ax)} y1={ctx.sy(ay)} x2={ctx.sx(k * bx)} y2={ctx.sy(k * by)} stroke={C.dim} strokeWidth="1.5" strokeDasharray="4 3" />
          <Arrow ctx={ctx} x={ax} y={ay} color={C.fn} />
          <Arrow ctx={ctx} x={bx} y={by} color={C.fill} />
        </svg>
        <Legend items={[{ color: C.fn, label: "a" }, { color: C.fill, label: "b" }, { color: C.acc, label: "夹角 θ" }]} />
      </Card>
      <Card>
        <SliderControl label="a.x" display={ax.toFixed(1)} color={C.fn} min={-6} max={6} step={0.1} value={ax} onChange={setAx} />
        <SliderControl label="a.y" display={ay.toFixed(1)} color={C.fn} min={-6} max={6} step={0.1} value={ay} onChange={setAy} />
        <SliderControl label="b.x" display={bx.toFixed(1)} color={C.fill} min={-6} max={6} step={0.1} value={bx} onChange={setBx} />
        <SliderControl label="b.y" display={by.toFixed(1)} color={C.fill} min={-6} max={6} step={0.1} value={by} onChange={setBy} last />
      </Card>
      <Card>
        <div className="stat-grid" style={{ gridTemplateColumns: "1fr 1fr" }}>
          <StatTile label="点积 a·b" value={dot.toFixed(2)} color={C.fn} />
          <StatTile label="夹角 θ" value={angDeg.toFixed(1) + "°"} color={C.acc} />
        </div>
        <div style={{ fontSize: 12.5, color: C.sub, marginTop: 10 }}>|a|={la.toFixed(2)}，|b|={lb.toFixed(2)}，cos θ={cos.toFixed(3)}。{Math.abs(dot) < 0.05 ? "两向量正交。" : dot > 0 ? "点积为正，方向偏向一致。" : "点积为负，方向偏向相反。"}</div>
      </Card>
      <Card>
        <Steps title="点积的三种视角" items={[
          { title: "坐标式", en: "aₓbₓ + a_yb_y", desc: "对应分量相乘后求和。", color: C.fn },
          { title: "几何式", en: "|a||b|cos θ", desc: "长度乘积与夹角余弦之积。", color: C.fill },
          { title: "投影式", en: "|a| · comp_a b", desc: "一个向量长度与另一向量投影之积。", color: C.acc },
        ]} />
      </Card>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
