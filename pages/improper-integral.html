<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>反常积分</title>
<link rel="stylesheet" href="../ui/theme.css" />
<link rel="stylesheet" href="../ui/components.css" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="../engine/parser.js"></script>
<script src="../engine/math.js"></script>
<script src="../engine/keyboard.js"></script>
<script src="../engine/plot.js"></script>
<script src="../engine/linalg.js"></script>
<script src="../engine/signal.js"></script>
<script src="../engine/ode.js"></script>
<script src="../ui/components.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo } = React;

const CASES = [
  { label: "1/x²", expr: "1/x^2", limit: 1, conv: true },
  { label: "1/x", expr: "1/x", limit: Infinity, conv: false },
  { label: "e^(-x)", expr: "exp(-x)", limit: 1, conv: true },
  { label: "1/x^1.5", expr: "1/x^1.5", limit: 2, conv: true },
];

function App() {
  const [exprStr, setExprStr] = useState("1/x^2");
  const [b, setB] = useState(6);

  const check = useMemo(() => validateInput(exprStr), [exprStr]);
  const isError = exprStr.trim().length > 0 && !check.valid;
  const f = check.fn || ((x) => 1 / (x * x));
  const a = 1;

  const xMax = Math.max(6, b + 1);
  const ctx = useMemo(() => createPlotContext({
    W: 360, H: 220, xMin: 0, xMax, yMin: 0, yMax: 1.3,
  }), [xMax]);

  const curve = useMemo(() => buildCurvePath((x) => (x < a ? NaN : f(x)), ctx), [f, ctx]);
  const fillArea = useMemo(() => buildFillPath(f, ctx, a, Math.min(b, xMax)), [f, ctx, b, xMax]);

  const area = useMemo(() => numericalIntegral(f, a, b, 2000), [f, b]);
  const areaBig = useMemo(() => numericalIntegral(f, a, 1e5, 200000), [f]);
  const converges = isFinite(areaBig) && areaBig < 1e4;

  const applyPreset = (p) => { setExprStr(p.expr); setB(6); };

  return (
    <div>
      <SidePanel handleLabel="输入">
        <PanelBlock title="被积函数 f(x)，x ≥ 1">
          <FormulaInput value={exprStr} onChange={setExprStr} isError={isError} errorMsg={check.error} />
        </PanelBlock>
        <PanelBlock title="预设函数">
          <PresetBar presets={CASES} onSelect={applyPreset} />
        </PanelBlock>
      </SidePanel>

      <PageHeader title="反常积分" subtitle="Improper integral — does the tail have finite area?" />
      <Intuition>
        当积分上界 <b style={{ color: C.fill }}>b → ∞</b>，无限延伸的尾部所对应的面积
        可能<b style={{ color: C.acc }}>收敛</b>于有限值，也可能<b style={{ color: C.warn }}>发散</b>至无穷。
        增大 b，观察阴影面积趋于稳定还是持续增长。
      </Intuition>

      <StickyChart>
        <Card variant="chart">
          <div className="chart-label">∫₁ᵇ f dx，b = {b.toFixed(1)} · 面积 ≈ {area.toFixed(4)}</div>
          <svg viewBox="0 0 360 220">
            <defs dangerouslySetInnerHTML={{ __html: AREA_GRADIENT_SVG + GLOW_FILTER_SVG }} />
            <GridLines ctx={ctx} />
            <Axes ctx={ctx} />
            <path d={fillArea} fill="url(#areaFill)" />
            <path d={curve} fill="none" stroke={C.fn} strokeWidth="1.5" />
            <DashedMarker ctx={ctx} x={a} color={C.acc} label="1" bold />
            <DashedMarker ctx={ctx} x={Math.min(b, xMax)} color={C.fill} label="b" bold />
          </svg>
          <Legend items={[{ color: C.fn, label: "f(x)" }, { color: C.fill, label: "尾部面积" }]} />
        </Card>
      </StickyChart>

      <Card>
        <div className="stat-grid" style={{ gridTemplateColumns: "1fr 1fr" }}>
          <StatTile label={`面积 ∫₁^${b.toFixed(0)}`} value={area.toFixed(4)} color={C.fill} />
          <StatTile label="b→∞ 极限"
            value={converges ? areaBig.toFixed(4) : "∞ 发散"}
            color={converges ? C.acc : C.warn} />
        </div>
        <div style={{ fontSize: 12.5, color: C.sub, marginTop: 10 }}>
          {converges
            ? <span>面积收敛于有限值 <b style={{ color: C.acc }}>{areaBig.toFixed(4)}</b>，反常积分收敛。</span>
            : <span style={{ color: C.warn }}>面积无界增长，反常积分发散。</span>}
        </div>
      </Card>

      <Card style={{ marginBottom: 0 }}>
        <Steps title="敛散性的判定" items={[
          { title: "有限上界", en: "Finite b", desc: "先计算 ∫₁ᵇ f dx，即普通定积分", color: C.fill },
          { title: "取极限", en: "Take limit", desc: "令 b→∞，考察面积的极限行为", color: C.acc },
          { title: "判敛散", en: "Converge?", desc: "极限有限则收敛，否则发散", color: C.warn },
        ]} />
      </Card>

      <DockSpacer />

      <BottomDock>
        <div className="dock-cell">
          <SliderControl label="上界 b" display={b.toFixed(1)} color={C.fill}
            min={2} max={50} step={0.5} value={b} onChange={setB} last
            hint="增大 b，观察面积是否趋于某一有限值" />
        </div>
      </BottomDock>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
