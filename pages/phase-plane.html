<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>相平面</title>
<link rel="stylesheet" href="../ui/theme.css" />
<link rel="stylesheet" href="../ui/components.css" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="../engine/parser.js"></script>
<script src="../engine/math.js"></script>
<script src="../engine/keyboard.js"></script>
<script src="../engine/plot.js"></script>
<script src="../engine/linalg.js"></script>
<script src="../engine/signal.js"></script>
<script src="../engine/ode.js"></script>
<script src="../ui/components.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;
// x'' + 2ζω x' + ω² x = 0  →  system: x'=v, v'=-ω²x - 2ζω v
const PRESETS = [
  { name: "中心 center", z: 0, w: 1 },
  { name: "螺旋 spiral", z: 0.25, w: 1.2 },
  { name: "结点 node", z: 1.4, w: 1 },
  { name: "鞍点 saddle", z: 0, w: -1 }, // w²<0 sign flips → saddle
];

function App() {
  const [z, setZ] = useState(0.25);   // damping ratio
  const [w, setW] = useState(1.2);    // frequency
  const ctx = createCenteredContext({ W: 360, H: 320, unit: 46 });
  const w2sign = w >= 0 ? 1 : -1;
  const w2 = w2sign * w * w; // allow negative to make saddle
  const deriv = (x, v) => [v, -w2 * x - 2 * z * Math.abs(w) * v];

  const trajFrom = (x0, v0) => {
    const pts = []; let x = x0, v = v0; const h = 0.02;
    for (let i = 0; i < 900; i++) {
      pts.push([x, v]);
      const [dx, dv] = deriv(x, v);
      x += h * dx; v += h * dv;
      if (Math.abs(x) > 3.5 || Math.abs(v) > 3.5) break;
    }
    return pts;
  };
  const seeds = [[2, 0], [-2, 0], [0, 2], [1.2, 1.2], [-1.2, -1.2], [1.8, -1]];
  const trajs = seeds.map(s => trajFrom(s[0], s[1]));
  const toPath = (pts) => pts.map((p, i) => (i === 0 ? "M" : "L") + ctx.sx(p[0]).toFixed(1) + " " + ctx.sy(p[1]).toFixed(1)).join(" ");
  const grid = []; for (let g = -3; g <= 3; g++) grid.push(g);
  const kind = w < 0 ? "鞍点（发散）" : z === 0 ? "中心（等幅环绕）" : z > 0 && z < 1 ? "螺旋收敛" : z >= 1 ? "过阻尼结点" : "螺旋发散";

  return (
    <div>
      <PageHeader title="相平面" subtitle="Phase plane — trajectories of position vs velocity" backHref="../index.html" />
      <Intuition>将二阶方程视为 <b>(x, x′)</b> 平面上的运动，每个初始状态对应一条<b style={{ color: C.acc }}>轨迹</b>。轨迹的整体形状决定系统类型：无阻尼为闭合曲线（<b>中心</b>），有阻尼为收敛于原点的<b>螺旋</b>，负刚度为发散的<b style={{ color: C.warn }}>鞍点</b>。</Intuition>
      <ExampleSwitcher examples={PRESETS} onChange={(i) => { setZ(PRESETS[i].z); setW(PRESETS[i].w); }} />
      <Card variant="chart">
        <div className="chart-label">相平面 (x, x′)</div>
        <svg viewBox="0 0 360 320">
          <defs dangerouslySetInnerHTML={{ __html: GLOW_FILTER_SVG }} />
          {grid.map(g => <g key={g}>
            <line x1={ctx.sx(g)} y1={ctx.sy(-3.4)} x2={ctx.sx(g)} y2={ctx.sy(3.4)} stroke={C.grid} strokeWidth="0.5" />
            <line x1={ctx.sx(-3.7)} y1={ctx.sy(g)} x2={ctx.sx(3.7)} y2={ctx.sy(g)} stroke={C.grid} strokeWidth="0.5" />
          </g>)}
          <line x1={ctx.sx(-3.7)} y1={ctx.sy(0)} x2={ctx.sx(3.7)} y2={ctx.sy(0)} stroke={C.axis} strokeWidth="1" />
          <line x1={ctx.sx(0)} y1={ctx.sy(-3.4)} x2={ctx.sx(0)} y2={ctx.sy(3.4)} stroke={C.axis} strokeWidth="1" />
          {trajs.map((t, i) => <path key={i} d={toPath(t)} fill="none" stroke={C.acc} strokeWidth="1.6" opacity="0.85" />)}
          {seeds.map((s, i) => <circle key={i} cx={ctx.sx(s[0])} cy={ctx.sy(s[1])} r="2.5" fill={C.fill} />)}
          <circle cx={ctx.sx(0)} cy={ctx.sy(0)} r="4" fill={C.warn} />
        </svg>
        <Legend items={[{ color: C.acc, label: "轨迹" }, { color: C.fill, label: "起点" }, { color: C.warn, label: "平衡点" }]} />
      </Card>
      <Card>
        <SliderControl label="阻尼比 ζ" display={z.toFixed(2)} color={C.fn} min={-0.3} max={2} step={0.05} value={z} onChange={setZ} />
        <SliderControl label="频率参数 ω" display={w.toFixed(2)} color={C.fill} min={-1.5} max={2} step={0.05} value={w} onChange={setW} last hint="ω 取负值对应负刚度，系统呈鞍点" />
      </Card>
      <Card>
        <div style={{ fontSize: 13, color: C.sub }}>当前类型：<b style={{ color: w < 0 ? C.warn : C.acc }}>{kind}</b>。平衡点的稳定性完全由 ζ 与 ω 决定，无需求出显式解。</div>
      </Card>
      <Card>
        <Steps title="相图分析三步" items={[
          { title: "降阶", en: "x'=v, v'=…", desc: "将二阶方程改写为一阶方程组。", color: C.fn },
          { title: "画轨迹", en: "trajectory", desc: "从多个初始状态积分得到轨迹。", color: C.acc },
          { title: "辨类型", en: "center/spiral/saddle", desc: "由轨迹形状判定平衡点的稳定性。", color: C.warn },
        ]} />
      </Card>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
