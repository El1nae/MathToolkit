<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>叉积，动手看</title>
<link rel="stylesheet" href="../ui/theme.css" />
<link rel="stylesheet" href="../ui/components.css" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="../engine/parser.js"></script>
<script src="../engine/math.js"></script>
<script src="../engine/keyboard.js"></script>
<script src="../engine/plot.js"></script>
<script src="../engine/linalg.js"></script>
<script src="../engine/signal.js"></script>
<script src="../engine/ode.js"></script>
<script src="../ui/components.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

function App() {
  const [ax, setAx] = useState(4), [ay, setAy] = useState(1);
  const [bx, setBx] = useState(1), [by, setBy] = useState(3);
  const ctx = createCenteredContext({ W: 360, H: 340, unit: 26 });
  const cross = ax * by - ay * bx;
  const area = Math.abs(cross);
  const quad = [[0, 0], [ax, ay], [ax + bx, ay + by], [bx, by]];
  const grid = []; for (let g = -6; g <= 6; g++) grid.push(g);

  return (
    <div>
      <PageHeader title="叉积，动手看" subtitle="Cross product — signed area of the parallelogram" backHref="../index.html" />
      <Intuition>二维叉积 <b>a × b = aₓb_y − a_ybₓ</b> 是一个标量：它的绝对值等于两向量张成的<b style={{ color: C.fill }}>平行四边形面积</b>。符号告诉你 b 在 a 的<b>左边还是右边</b>（逆时针为正）。</Intuition>
      <Card variant="chart">
        <svg viewBox="0 0 360 340">
          <defs dangerouslySetInnerHTML={{ __html: GLOW_FILTER_SVG }} />
          {grid.map(g => <g key={g}>
            <line x1={ctx.sx(g)} y1={ctx.sy(-6)} x2={ctx.sx(g)} y2={ctx.sy(6)} stroke={C.grid} strokeWidth="0.5" />
            <line x1={ctx.sx(-6)} y1={ctx.sy(g)} x2={ctx.sx(6)} y2={ctx.sy(g)} stroke={C.grid} strokeWidth="0.5" />
          </g>)}
          <line x1={ctx.sx(-6)} y1={ctx.sy(0)} x2={ctx.sx(6)} y2={ctx.sy(0)} stroke={C.axis} strokeWidth="1" />
          <line x1={ctx.sx(0)} y1={ctx.sy(-6)} x2={ctx.sx(0)} y2={ctx.sy(6)} stroke={C.axis} strokeWidth="1" />
          <polygon points={quad.map(p => ctx.sx(p[0]) + "," + ctx.sy(p[1])).join(" ")} fill={C.fill} opacity="0.3" stroke={C.fill} strokeWidth="1" />
          <Arrow ctx={ctx} x={ax} y={ay} color={C.fn} />
          <Arrow ctx={ctx} x={bx} y={by} color={C.acc} />
        </svg>
        <Legend items={[{ color: C.fn, label: "a" }, { color: C.acc, label: "b" }, { color: C.fill, label: "面积" }]} />
      </Card>
      <Card>
        <SliderControl label="a.x" display={ax.toFixed(1)} color={C.fn} min={-6} max={6} step={0.1} value={ax} onChange={setAx} />
        <SliderControl label="a.y" display={ay.toFixed(1)} color={C.fn} min={-6} max={6} step={0.1} value={ay} onChange={setAy} />
        <SliderControl label="b.x" display={bx.toFixed(1)} color={C.acc} min={-6} max={6} step={0.1} value={bx} onChange={setBx} />
        <SliderControl label="b.y" display={by.toFixed(1)} color={C.acc} min={-6} max={6} step={0.1} value={by} onChange={setBy} last />
      </Card>
      <Card>
        <div className="stat-grid" style={{ gridTemplateColumns: "1fr 1fr" }}>
          <StatTile label="叉积 a×b (有向)" value={cross.toFixed(2)} color={C.fn} />
          <StatTile label="平行四边形面积" value={area.toFixed(2)} color={C.fill} />
        </div>
        <div style={{ fontSize: 12.5, color: C.sub, marginTop: 10 }}>{Math.abs(cross) < 0.05 ? "叉积≈0：两向量共线，面积退化为零。" : cross > 0 ? "叉积为正：b 在 a 的逆时针方向。" : "叉积为负：b 在 a 的顺时针方向。"}</div>
      </Card>
      <Card>
        <Steps title="三步理解叉积" items={[
          { title: "交叉相乘", en: "aₓb_y − a_ybₓ", desc: "对角相乘再相减，得到有向标量。", color: C.fn },
          { title: "取面积", en: "|a×b|", desc: "绝对值就是平行四边形面积。", color: C.fill },
          { title: "读符号", en: "sign", desc: "正=逆时针，负=顺时针，零=共线。", color: C.acc },
        ]} />
      </Card>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
