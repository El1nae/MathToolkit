<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>奈奎斯特采样</title>
<link rel="stylesheet" href="../ui/theme.css" />
<link rel="stylesheet" href="../ui/components.css" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="../engine/parser.js"></script>
<script src="../engine/math.js"></script>
<script src="../engine/keyboard.js"></script>
<script src="../engine/plot.js"></script>
<script src="../engine/linalg.js"></script>
<script src="../engine/signal.js"></script>
<script src="../engine/ode.js"></script>
<script src="../ui/components.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;
const TMAX = 1; // one second window

function App() {
  const [f, setF] = useState(3);   // signal frequency Hz
  const [fs, setFs] = useState(8); // sampling rate Hz
  const orig = (t) => Math.sin(2 * Math.PI * f * t);
  const ctx = createPlotContext({ W: 360, H: 150, pad: { l: 26, r: 14, t: 14, b: 20 }, xMin: 0, xMax: TMAX, yMin: -1.3, yMax: 1.3 });
  const origPath = buildCurvePath(orig, ctx, { n: 500 });

  // samples
  const samples = [];
  const nS = Math.max(1, Math.floor(fs * TMAX));
  for (let n = 0; n <= nS; n++) { const t = n / fs; if (t <= TMAX + 1e-9) samples.push({ t, v: orig(t) }); }

  // reconstruction via sinc interpolation
  const recon = (t) => {
    let s = 0;
    samples.forEach(sm => { const x = Math.PI * (t * fs - sm.t * fs); s += sm.v * (Math.abs(x) < 1e-6 ? 1 : Math.sin(x) / x); });
    return s;
  };
  const reconPath = buildCurvePath(recon, ctx, { n: 500 });
  const aliasing = fs < 2 * f;
  const fAlias = Math.abs(f - fs * Math.round(f / fs));

  return (
    <div>
      <PageHeader title="奈奎斯特采样" subtitle="Sampling — you must sample faster than twice the frequency" backHref="../index.html" />
      <Intuition>由离散样本无失真还原连续信号，要求采样率 <b>fs</b> <b style={{ color: C.acc }}>大于信号最高频率的两倍</b>（fs &gt; 2f）。否则高频分量将被误判为低频分量，即<b style={{ color: C.warn }}>混叠</b>；车轮反向旋转、摩尔纹均属此现象。</Intuition>
      <Card variant="chart">
        <div className="chart-label">① 连续信号 x(t)</div>
        <svg viewBox="0 0 360 150">
          <defs dangerouslySetInnerHTML={{ __html: GLOW_FILTER_SVG }} />
          <line x1={ctx.pad.l} y1={ctx.sy(0)} x2={ctx.W - ctx.pad.r} y2={ctx.sy(0)} stroke={C.axis} strokeWidth="1" />
          <path d={origPath} fill="none" stroke={C.fn} strokeWidth="2" filter="url(#glow)" />
        </svg>
      </Card>
      <Card variant="chart">
        <div className="chart-label">② 采样点（间隔 1/fs）</div>
        <svg viewBox="0 0 360 150">
          <line x1={ctx.pad.l} y1={ctx.sy(0)} x2={ctx.W - ctx.pad.r} y2={ctx.sy(0)} stroke={C.axis} strokeWidth="1" />
          <path d={origPath} fill="none" stroke={C.ghost} strokeWidth="1.2" />
          {samples.map((s, i) => (
            <g key={i}>
              <line x1={ctx.sx(s.t)} y1={ctx.sy(0)} x2={ctx.sx(s.t)} y2={ctx.sy(s.v)} stroke={C.fill} strokeWidth="1.2" />
              <circle cx={ctx.sx(s.t)} cy={ctx.sy(s.v)} r="3" fill={C.fill} />
            </g>
          ))}
        </svg>
      </Card>
      <Card variant="chart">
        <div className="chart-label">③ 重建信号（sinc 插值）</div>
        <svg viewBox="0 0 360 150">
          <line x1={ctx.pad.l} y1={ctx.sy(0)} x2={ctx.W - ctx.pad.r} y2={ctx.sy(0)} stroke={C.axis} strokeWidth="1" />
          <path d={origPath} fill="none" stroke={C.ghost} strokeWidth="1.2" strokeDasharray="4 3" />
          <path d={reconPath} fill="none" stroke={aliasing ? C.warn : C.acc} strokeWidth="2" filter="url(#glow)" />
        </svg>
        <Legend items={[{ color: C.fn, label: "原信号" }, { color: C.fill, label: "样本" }, { color: aliasing ? C.warn : C.acc, label: "重建" }]} />
      </Card>
      <Card>
        <SliderControl label="信号频率 f" display={f.toFixed(1) + " Hz"} color={C.fn} min={1} max={12} step={0.5} value={f} onChange={setF} />
        <SliderControl label="采样率 fs" display={fs.toFixed(1) + " Hz"} color={C.fill} min={2} max={30} step={0.5} value={fs} onChange={setFs} last hint={"奈奎斯特阈值 = 2f = " + (2 * f).toFixed(1) + " Hz"} />
      </Card>
      <Card>
        <div style={{ fontSize: 13, color: C.sub }}>{aliasing
          ? <span><b style={{ color: C.warn }}>发生混叠。</b> fs &lt; 2f，{f}Hz 被误判为约 {fAlias.toFixed(1)}Hz 的低频，重建失真。</span>
          : <span><b style={{ color: C.acc }}>采样充分。</b> fs ≥ 2f，样本可无失真还原原信号。</span>}</div>
      </Card>
      <Card>
        <Steps title="采样定理三步" items={[
          { title: "采样", en: "x[n] = x(n/fs)", desc: "每隔 1/fs 秒记录一个瞬时值。", color: C.fill },
          { title: "判据", en: "fs > 2·f_max", desc: "采样率须高于最高频率的两倍。", color: C.acc },
          { title: "重建", en: "sinc 插值", desc: "满足判据时，样本可无失真还原信号。", color: C.fn },
        ]} />
      </Card>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
