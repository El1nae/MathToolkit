<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>微积分基本定理</title>
<link rel="stylesheet" href="../ui/theme.css" />
<link rel="stylesheet" href="../ui/components.css" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="../engine/parser.js"></script>
<script src="../engine/math.js"></script>
<script src="../engine/keyboard.js"></script>
<script src="../engine/plot.js"></script>
<script src="../engine/linalg.js"></script>
<script src="../engine/signal.js"></script>
<script src="../engine/ode.js"></script>
<script src="../ui/components.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo } = React;

function App() {
  const [exprStr, setExprStr] = useState("x^2");
  const [xMin, setXMin] = useState(0);
  const [xMax, setXMax] = useState(3);
  const [x, setX] = useState(1.5);

  const check = useMemo(() => validateInput(exprStr), [exprStr]);
  const isError = exprStr.trim().length > 0 && !check.valid;
  const f = check.fn || ((x) => x * x);
  const cx = Math.max(xMin, Math.min(xMax, x));

  const { yMin, yMax } = useMemo(() => autoRange(f, xMin, xMax), [f, xMin, xMax]);
  const topCtx = useMemo(() => createPlotContext({
    W: 360, H: 175, pad: { l: 28, r: 10, t: 12, b: 22 }, xMin, xMax, yMin, yMax,
  }), [xMin, xMax, yMin, yMax]);

  const curve = useMemo(() => buildCurvePath(f, topCtx), [f, topCtx]);
  const fillArea = useMemo(() => buildFillPath(f, topCtx, xMin, cx), [f, topCtx, xMin, cx]);
  const accum = useMemo(() => buildAccumPath(f, xMin, topCtx, cx), [f, xMin, topCtx, cx]);
  const aCtx = accum.ctx;
  const fx = f(cx);

  const applyPreset = (p) => {
    setExprStr(p.expr);
    setXMin(Math.max(0, p.xRange[0])); setXMax(p.xRange[1]);
    setX(Math.max(0, p.xRange[0]) + (p.xRange[1] - Math.max(0, p.xRange[0])) * 0.5);
  };

  return (
    <div>
      <SidePanel handleLabel="输入">
        <PanelBlock title="输入被积函数 f(x)">
          <FormulaInput value={exprStr} onChange={setExprStr} isError={isError} errorMsg={check.error} />
        </PanelBlock>
        <PanelBlock title="预设函数">
          <PresetBar presets={PRESETS.slice(0, 8)} onSelect={applyPreset} />
        </PanelBlock>
        <PanelBlock title="x 轴范围">
          <RangeInputs min={xMin} max={xMax} onMinChange={setXMin} onMaxChange={setXMax} />
        </PanelBlock>
      </SidePanel>

      <PageHeader title="微积分基本定理" subtitle="Fundamental Theorem — differentiation undoes integration" />
      <Intuition>
        面积函数 <b style={{ color: C.acc }}>F(x)=∫f</b> 表示曲线下从 a 到 x 累积的面积。
        核心结论：F 在 x 处的<b>变化率</b>（斜率）恰等于 <b style={{ color: C.fn }}>f(x)</b>。
        改变 x，上图面积与下图累积曲线同步变化。
      </Intuition>

      <StickyChart>
        <Card variant="chart">
          <div className="chart-label">f(x) — 阴影面积从 {xMin.toFixed(1)} 累积到 x = {cx.toFixed(2)}</div>
          <svg viewBox="0 0 360 175">
            <defs dangerouslySetInnerHTML={{ __html: AREA_GRADIENT_SVG + GLOW_FILTER_SVG }} />
            <GridLines ctx={topCtx} />
            <Axes ctx={topCtx} />
            <path d={fillArea} fill="url(#areaFill)" />
            <path d={curve} fill="none" stroke={C.fn} strokeWidth="1.5" />
            <DashedMarker ctx={topCtx} x={cx} color={C.acc} label="x" bold />
            <circle cx={topCtx.sx(cx)} cy={topCtx.sy(Math.max(yMin, Math.min(yMax, fx)))} r="3" fill={C.fn} stroke={C.bg} strokeWidth="1.5" />
          </svg>
          <Legend items={[{ color: C.fn, label: "f(x)" }, { color: C.fill, label: "累积面积" }]} />
        </Card>

        <Card variant="chart">
          <div className="chart-label">F(x) = ∫ₐˣ f(t) dt — 累积面积曲线，斜率 = f(x)</div>
          <svg viewBox="0 0 360 150">
            <GridLines ctx={aCtx} />
            <Axes ctx={aCtx} />
            <path d={accum.gray} fill="none" stroke={C.grid} strokeWidth="1.5" />
            <path d={accum.green} fill="none" stroke={C.acc} strokeWidth="1.5" />
            {/* tangent slope = f(x) */}
            <line x1={aCtx.sx(cx - 0.6)} y1={aCtx.sy(accum.Fb - fx * 0.6)}
              x2={aCtx.sx(cx + 0.6)} y2={aCtx.sy(accum.Fb + fx * 0.6)}
              stroke={C.fn} strokeWidth="1.5" />
            <DashedMarker ctx={aCtx} x={cx} color={C.accDim} />
            <circle cx={aCtx.sx(cx)} cy={aCtx.sy(accum.Fb)} r="3" fill={C.acc} stroke={C.bg} strokeWidth="1.5" />
          </svg>
          <Legend items={[
            { color: C.acc, label: "F(x) 累积" },
            { color: C.fn, label: "切线斜率 = f(x)" },
          ]} />
        </Card>
      </StickyChart>

      <Card>
        <div className="stat-grid" style={{ gridTemplateColumns: "1fr 1fr" }}>
          <StatTile label="F(x) 累积面积" value={accum.Fb.toFixed(3)} color={C.acc} />
          <StatTile label="F′(x) = f(x)" value={fx.toFixed(3)} color={C.fn} />
        </div>
      </Card>

      <Card style={{ marginBottom: 0 }}>
        <Steps title="基本定理的构造" items={[
          { title: "累积面积", en: "Accumulate", desc: "F(x) 为从 a 到 x 曲线下的面积", color: C.acc },
          { title: "求斜率", en: "Slope", desc: "F 在 x 处的切线斜率等于 f(x)", color: C.fn },
          { title: "互逆", en: "Inverse", desc: "微分与积分互为逆运算", color: C.fill },
        ]} />
      </Card>

      <DockSpacer />

      <BottomDock>
        <div className="dock-cell">
          <SliderControl label="位置 x" display={cx.toFixed(2)} color={C.acc}
            min={xMin} max={xMax} step={0.01} value={cx} onChange={setX} last
            hint="上图面积等于下图 F(x) 的高度；F 的斜率等于 f(x)" />
        </div>
      </BottomDock>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
