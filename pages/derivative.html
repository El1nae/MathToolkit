<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>微分</title>
<link rel="stylesheet" href="../ui/theme.css" />
<link rel="stylesheet" href="../ui/components.css" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="../engine/parser.js"></script>
<script src="../engine/math.js"></script>
<script src="../engine/keyboard.js"></script>
<script src="../engine/plot.js"></script>
<script src="../engine/linalg.js"></script>
<script src="../engine/signal.js"></script>
<script src="../engine/ode.js"></script>
<script src="../ui/components.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useRef } = React;

const PLOTBG = "#101116";
const MONO = "'Source Code Pro', monospace";

function App() {
  const [exprStr, setExprStr] = useState("x^2");
  const [xMin, setXMin] = useState(-3);
  const [xMax, setXMax] = useState(3);
  const [x0, setX0] = useState(0.8);
  const [dx, setDx] = useState(1.0);
  const inputRef = useRef(null);

  const check = useMemo(() => validateInput(exprStr), [exprStr]);
  const isError = exprStr.trim().length > 0 && !check.valid;
  const f = check.fn || ((x) => x * x);

  const { yMin, yMax } = useMemo(() => autoRange(f, xMin, xMax), [f, xMin, xMax]);
  const ctx = createPlotContext({ W: 360, H: 220, xMin, xMax, yMin, yMax });
  const curvePath = useMemo(() => buildCurvePath(f, ctx), [f, xMin, xMax, yMin, yMax]);

  const cx0 = Math.max(xMin + 0.01, Math.min(xMax - 0.01, x0));
  const x1 = Math.min(cx0 + dx, xMax);
  const y0 = f(cx0), y1 = f(x1);
  const slopeSecant = dx > 0.001 ? (y1 - y0) / (x1 - cx0) : numericalDerivative(f, cx0);
  const slopeTangent = numericalDerivative(f, cx0);
  const err = Math.abs(slopeSecant - slopeTangent);

  const tL = { x: cx0 - 1.2, y: y0 + slopeTangent * (-1.2) };
  const tR = { x: cx0 + 1.2, y: y0 + slopeTangent * (1.2) };
  const secL = { x: cx0 - 0.3, y: y0 + slopeSecant * (-0.3) };
  const secR = { x: x1 + 0.3, y: y0 + slopeSecant * (x1 + 0.3 - cx0) };

  const hasX = ctx.yMin <= 0 && ctx.yMax >= 0;
  const hasY = ctx.xMin <= 0 && ctx.xMax >= 0;

  const applyPreset = (p) => {
    setExprStr(p.expr);
    const [nMin, nMax] = p.xRange;
    setXMin(nMin); setXMax(nMax);
    setX0((nMin + nMax) * 0.4); setDx(1.0);
  };

  return (
    <div>
      <SidePanel handleLabel="输入">
        <PanelBlock title="输入函数 f(x) =">
          <FormulaInput inputRef={inputRef} value={exprStr} onChange={setExprStr}
            isError={isError} errorMsg={isError ? (check.error || "无法解析该公式") : null} />
        </PanelBlock>
        <PanelBlock title="预设函数">
          <PresetBar onSelect={applyPreset} />
        </PanelBlock>
        <PanelBlock title="x 轴范围">
          <RangeInputs min={xMin} max={xMax} onMinChange={setXMin} onMaxChange={setXMax} />
        </PanelBlock>
      </SidePanel>

      <PageHeader title="微分" tag="Derivative"
        subtitle="the slope of the tangent line — f′(x₀)" />

      <Intuition>
        <b style={{ color: C.fn }}>割线</b> 连接相距 Δx 的两点，其斜率为平均变化率 Δy/Δx。
        当 Δx → 0，割线收敛为 <b style={{ color: C.ink }}>切线</b>，其斜率即导数 f′(x₀)。
      </Intuition>

      <StickyChart>
        <Card variant="chart">
          <svg viewBox="0 0 360 220" style={{ width: "100%", display: "block" }}>
            <rect x="0" y="0" width="360" height="220" fill={PLOTBG} />
            <GridLines ctx={ctx} />
            <Axes ctx={ctx} />
            {hasX && hasY && <Crosshair px={ctx.sx(0)} py={ctx.sy(0)} color="rgba(255,255,255,0.35)" />}
            <path d={curvePath} fill="none" stroke={C.ink} strokeWidth="1.5" />
            {dx > 0.02 && (
              <line x1={ctx.sx(secL.x)} y1={ctx.sy(secL.y)} x2={ctx.sx(secR.x)} y2={ctx.sy(secR.y)}
                stroke="rgba(255,255,255,0.38)" strokeWidth="1" strokeDasharray="6 4" />
            )}
            <line x1={ctx.sx(tL.x)} y1={ctx.sy(tL.y)} x2={ctx.sx(tR.x)} y2={ctx.sy(tR.y)}
              stroke={C.fn} strokeWidth="1" />
            <line x1={ctx.sx(cx0)} y1={ctx.pad.t} x2={ctx.sx(cx0)} y2={ctx.H - ctx.pad.b}
              stroke="rgba(124,156,196,0.30)" strokeWidth="0.5" strokeDasharray="2 3" />
            <text x={ctx.sx(cx0)} y={ctx.H - ctx.pad.b + 13} fontSize="9" fill={C.fn}
              textAnchor="middle" fontFamily={MONO} fontWeight="600">x₀</text>
            <Crosshair px={ctx.sx(cx0)} py={ctx.sy(y0)} />
            {dx > 0.02 && (
              <circle cx={ctx.sx(x1)} cy={ctx.sy(y1)} r="3" fill={PLOTBG} stroke={C.axis} strokeWidth="1" />
            )}
            <circle cx={ctx.sx(cx0)} cy={ctx.sy(y0)} r="3" fill={C.fn} />
          </svg>
          <div className="legend">
            <span className="legend-item"><span className="legend-swatch" style={{ color: C.ink }} />f(x)</span>
            <span className="legend-item"><span className="legend-swatch dashed" style={{ color: "rgba(255,255,255,0.55)" }} />割线 secant</span>
            <span className="legend-item"><span className="legend-swatch" style={{ color: C.fn }} />切线 tangent</span>
          </div>
        </Card>
      </StickyChart>

      <Card>
        <div className="stat-grid" style={{ gridTemplateColumns: "1fr 1fr" }}>
          <StatTile label="secant · Δy/Δx" value={slopeSecant.toFixed(3)} color={C.sub} />
          <StatTile label="tangent · f′(x₀)" value={slopeTangent.toFixed(3)} color={C.fn} />
        </div>
        <KeyLine style={{ marginTop: 12 }}>
          误差 |Δy/Δx − f′(x₀)| = {err.toFixed(4)}
        </KeyLine>
      </Card>

      <Card>
        <Steps title="导数的构造" items={[
          { title: "取两点", en: "Pick two points", desc: "在曲线上取 x₀ 与 x₀+Δx", color: C.fn },
          { title: "作割线", en: "Draw secant", desc: "两点连线，斜率为 Δy/Δx", color: C.fill },
          { title: "Δx → 0", en: "Converge", desc: "间距趋于零，割线收敛为切线，斜率即导数", color: C.ink },
        ]} />
      </Card>

      <DockSpacer />

      <BottomDock>
        <div className="dock-cell">
          <SliderControl label="x₀ 位置" display={cx0.toFixed(2)} color={C.fn}
            min={xMin} max={xMax} step={0.01} value={cx0} onChange={setX0} last />
        </div>
        <div className="dock-cell">
          <SliderControl label="Δx 间距" display={dx.toFixed(2)} color={C.ink}
            min={0.01} max={2.0} step={0.01} value={dx} onChange={setDx} last />
        </div>
      </BottomDock>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
