<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>极坐标面积</title>
<link rel="stylesheet" href="../ui/theme.css" />
<link rel="stylesheet" href="../ui/components.css" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="../engine/parser.js"></script>
<script src="../engine/math.js"></script>
<script src="../engine/keyboard.js"></script>
<script src="../engine/plot.js"></script>
<script src="../engine/linalg.js"></script>
<script src="../engine/signal.js"></script>
<script src="../engine/ode.js"></script>
<script src="../ui/components.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo } = React;

const CURVES = [
  { name: "玫瑰线", expr: "cos(2t)" }, { name: "心形线", expr: "1+cos(t)" },
  { name: "圆", expr: "1" }, { name: "螺线", expr: "t/6" },
];

function App() {
  const [rExpr, setRExpr] = useState("cos(2t)");
  const [theta, setTheta] = useState(3.14);

  const rf = useMemo(() => parseExpr(rExpr, "t") || ((t) => Math.cos(2 * t)), [rExpr]);
  const thMax = 2 * Math.PI;
  const cth = Math.max(0, Math.min(thMax, theta));

  const ctx = useMemo(() => createCenteredContext({ W: 360, H: 300, unit: 100 }), []);
  const toXY = (th) => { const r = rf(th); return { x: r * Math.cos(th), y: r * Math.sin(th) }; };

  const fullPath = useMemo(() => {
    let d = ""; const N = 720;
    for (let i = 0; i <= N; i++) { const th = (i / N) * thMax; const p = toXY(th); if (!isFinite(p.x) || !isFinite(p.y)) { d += " "; continue; } d += (i === 0 ? "M" : "L") + ctx.sx(p.x).toFixed(1) + " " + ctx.sy(p.y).toFixed(1) + " "; }
    return d;
  }, [rf, ctx]);

  // fan sector filled area from 0 to cth
  const fanPath = useMemo(() => {
    let d = "M" + ctx.sx(0).toFixed(1) + " " + ctx.sy(0).toFixed(1) + " ";
    const N = 360;
    for (let i = 0; i <= N; i++) { const th = (i / N) * cth; const p = toXY(th); if (!isFinite(p.x)) continue; d += "L" + ctx.sx(p.x).toFixed(1) + " " + ctx.sy(p.y).toFixed(1) + " "; }
    return d + "Z";
  }, [rf, cth, ctx]);

  const area = useMemo(() => 0.5 * numericalIntegral((th) => { const r = rf(th); return isFinite(r) ? r * r : 0; }, 0, cth, 1000), [rf, cth]);
  const pEnd = toXY(cth);

  return (
    <div>
      <PageHeader title="极坐标面积" subtitle="Polar area — sweeping sectors with ½∫r²dθ" />
      <Intuition>
        极坐标下，半径由角度决定，<b style={{ color: C.fn }}>r(θ)</b> 给出各方向的边界。
        面积按角度剖分为<b style={{ color: C.fill }}>扇形微元</b>：每片近似为三角形，面积为 ½r²dθ。
        对 θ 积分即得由曲线围成的总面积。
      </Intuition>

      <Card>
        <ExampleSwitcher examples={CURVES.map((c) => ({ name: c.name }))}
          active={CURVES.findIndex((c) => c.expr === rExpr)} onChange={(i) => { setRExpr(CURVES[i].expr); setTheta(3.14); }} />
        <div className="section-label" style={{ marginBottom: 6 }}>r(θ) =（变量用 t 代表 θ）</div>
        <FormulaInput value={rExpr} onChange={setRExpr} placeholder="例如 cos(2t)" />
      </Card>

      <Card variant="chart">
        <div className="chart-label">θ = {cth.toFixed(2)} rad · 累计面积 ≈ {area.toFixed(4)}</div>
        <svg viewBox="0 0 360 300">
          <defs dangerouslySetInnerHTML={{ __html: GLOW_FILTER_SVG }} />
          <line x1="0" y1={ctx.sy(0)} x2="360" y2={ctx.sy(0)} stroke={C.axis} strokeWidth="1" />
          <line x1={ctx.sx(0)} y1="0" x2={ctx.sx(0)} y2="300" stroke={C.axis} strokeWidth="1" />
          {[0.5, 1, 1.5, 2].map((rr, i) => (
            <circle key={i} cx={ctx.sx(0)} cy={ctx.sy(0)} r={rr * ctx.unit} fill="none" stroke={C.grid} strokeWidth="0.5" />
          ))}
          <path d={fanPath} fill={C.fill} opacity="0.18" />
          <path d={fullPath} fill="none" stroke={C.ghost} strokeWidth="1.2" strokeDasharray="3 4" />
          <path d={fanPath} fill="none" stroke={C.fill} strokeWidth="2" filter="url(#glow)" />
          <line x1={ctx.sx(0)} y1={ctx.sy(0)} x2={ctx.sx(pEnd.x)} y2={ctx.sy(pEnd.y)} stroke={C.acc} strokeWidth="2" />
          <circle cx={ctx.sx(pEnd.x)} cy={ctx.sy(pEnd.y)} r="5" fill={C.acc} stroke={C.bg} strokeWidth="1.5" />
        </svg>
        <Legend items={[
          { color: C.ghost, label: "完整曲线", dashed: true },
          { color: C.fill, label: "累计扇形面积" },
          { color: C.acc, label: "当前角度 θ" },
        ]} />
      </Card>

      <Card>
        <SliderControl label="角度 θ" display={cth.toFixed(2)} color={C.acc}
          min={0} max={thMax} step={0.01} value={cth} onChange={setTheta} last
          hint="增大 θ，扇形微元逐段累加为面积" />
        <div className="stat-grid" style={{ gridTemplateColumns: "1fr 1fr", marginTop: 12 }}>
          <StatTile label="r(θ)" value={rf(cth).toFixed(3)} color={C.fn} />
          <StatTile label="面积 ½∫r²dθ" value={area.toFixed(4)} color={C.fill} />
        </div>
      </Card>

      <Card style={{ marginBottom: 0 }}>
        <Steps title="极坐标面积三步" items={[
          { title: "扇形剖分", en: "Sectors", desc: "按角度剖分为扇形微元", color: C.fill },
          { title: "微元面积", en: "½r²dθ", desc: "每片近似三角形，面积 ½r²dθ", color: C.acc },
          { title: "积分", en: "Integrate", desc: "面积 = ½∫r²dθ，累加全部扇形", color: C.fn },
        ]} />
      </Card>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
